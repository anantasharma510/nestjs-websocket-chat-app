<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Realtime Chat UI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 400px;
      height: 600px;
      background: #1e293b;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .chat-header {
      padding: 15px;
      background: #334155;
      color: white;
      font-weight: bold;
      text-align: center;
    }

    .chat-messages {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
    }

    .message.user1 {
      align-self: flex-start;
      background: #475569;
      color: white;
    }

    .message.user2 {
      align-self: flex-end;
      background: #22c55e;
      color: white;
    }

    .username {
      font-size: 11px;
      opacity: 0.7;
      margin-bottom: 3px;
    }

    .chat-input {
      display: flex;
      padding: 10px;
      background: #334155;
    }

    .chat-input input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    .chat-input button {
      margin-left: 10px;
      padding: 10px 15px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .chat-input button:hover {
      background: #16a34a;
    }
  </style>
</head>
<body>

  <div class="chat-container">
    
    <div class="chat-header">
      Group Chat Room
    </div>

    <div class="chat-messages">
      
      <div class="message user1">
        <div class="username">User A</div>
        Hello bro 👋
      </div>

      <div class="message user2">
        <div class="username">User B</div>
        Hey! What's up?
      </div>

      <div class="message user1">
        <div class="username">User A</div>
        Building realtime chat 🚀
      </div>

      <div class="message user2">
        <div class="username">User B</div>
        Nice 🔥
      </div>

    </div>

    <div class="chat-input">
      <input type="text" placeholder="Type a message..." />
      <button>Send</button>
    </div>

  </div>

</body>
</html>
